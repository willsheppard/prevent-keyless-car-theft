name: Publish scheduled posts
on:
  schedule:
    - cron: '0 * * * *'  # run hourly (UTC)
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish due drafts
        run: |
          # simple example: move drafts with date <= now into _posts and commit
          python scripts/publish_due_drafts.py
      - name: Push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Publish scheduled posts"
